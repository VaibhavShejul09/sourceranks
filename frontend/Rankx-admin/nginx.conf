server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # =========================================
    # Security Hardening
    # =========================================
    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # =========================================
    # Gzip Compression
    # =========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;

    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # =========================================
    # React SPA Routing
    # =========================================
    location / {
        try_files $uri /index.html;
    }

    # =========================================
    # Static Asset Caching
    # =========================================
    location /assets/ {
        expires 30d;

        add_header Cache-Control "public, immutable";

        access_log off;
    }

    # =========================================
    # Health Endpoint for Kubernetes
    # =========================================
    location /health {
        access_log off;
        return 200 "healthy\n";
    }

    # =========================================
    # Prevent Access to Hidden Files
    # =========================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}